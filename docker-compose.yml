# ========================================
# Language Learning - Docker Compose 配置
# ========================================
# 使用方法:
#   构建并启动: docker-compose up -d --build
#   查看日志: docker-compose logs -f
#   停止服务: docker-compose down
# ========================================

version: '3.8'

services:
  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: language-learning
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      # 阿里云 OSS
      - ALI_OSS_REGION=${ALI_OSS_REGION}
      - ALI_OSS_ACCESS_KEY_ID=${ALI_OSS_ACCESS_KEY_ID}
      - ALI_OSS_ACCESS_KEY_SECRET=${ALI_OSS_ACCESS_KEY_SECRET}
      - ALI_OSS_BUCKET=${ALI_OSS_BUCKET}
      # 阿里云短信
      - ALI_SMS_ACCESS_KEY_ID=${ALI_SMS_ACCESS_KEY_ID}
      - ALI_SMS_ACCESS_KEY_SECRET=${ALI_SMS_ACCESS_KEY_SECRET}
      - ALI_SMS_SIGN_NAME=${ALI_SMS_SIGN_NAME}
      # 邮件服务
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      # 微信小程序
      - WECHAT_MINI_APPID=${WECHAT_MINI_APPID}
      - WECHAT_MINI_SECRET=${WECHAT_MINI_SECRET}
      # 微信支付
      - WECHAT_MCH_ID=${WECHAT_MCH_ID}
      - WECHAT_API_KEY=${WECHAT_API_KEY}
    depends_on:
      - db
    networks:
      - language-learning-network

  # PostgreSQL 数据库 (可选，如果使用外部数据库可注释)
  db:
    image: postgres:15-alpine
    container_name: language-learning-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-language_learning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - language-learning-network

volumes:
  postgres_data:

networks:
  language-learning-network:
    driver: bridge
